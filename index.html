<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ต่อไฟฟ้าประทังชีวิตเด็กปากคลอง - Survival Edition</title>
    <style>
        body { background: #0a0e14; color: #4ecca3; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        #game-header { text-align: center; padding: 10px; border-bottom: 2px solid #4ecca3; width: 100%; background: #1a1a2e; }
        canvas { border: 4px solid #30475e; background: #000; cursor: crosshair; margin-top: 20px; box-shadow: 0 0 20px rgba(78, 204, 163, 0.2); }
        #status-panel { width: 800px; padding: 15px; background: #16213e; border: 1px solid #4ecca3; margin-top: 10px; display: flex; justify-content: space-between; }
        .danger { color: #ff4b2b; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        button { background: #4ecca3; border: none; padding: 10px 20px; color: #1a1a2e; font-weight: bold; cursor: pointer; }
        button:hover { background: #45b393; }
    </style>
</head>
<body>

<div id="game-header">
    <h1>🔌 ต่อไฟฟ้าประทังชีวิตเด็กปากคลอง v1.0</h1>
    <p>ภารกิจ: ลากสายไฟจาก "แบตเตอรี่" ไปหา "หลอดไฟนีออน" ห้ามไฟเกิน ห้ามไฟซ็อต!</p>
</div>

<canvas id="gameCanvas" width="800" height="500"></canvas>

<div id="status-panel">
    <div id="stats">
        กระแสไฟ: <span id="current-val">0</span> A | 
        สถานะ: <span id="game-msg">รอการเชื่อมต่อ...</span>
    </div>
    <button onclick="resetGame()">เริ่มใหม่ / ตัดสายไฟ</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const currentDisp = document.getElementById('current-val');
    const msgDisp = document.getElementById('game-msg');

    // ทฤษฎีไฟฟ้าปากคลอง (Constants)
    const VOLTAGE_SOURCE = 220; // 220V มาตรฐานไทย
    const MAX_SAFE_CURRENT = 10.0; // เกินนี้สายไหม้/ระเบิด
    const MIN_REQUIRED_CURRENT = 0.5; // น้อยกว่านี้ไฟไม่ติด
    const RESISTANCE_PER_PIXEL = 0.05; // สายไฟยิ่งยาวยิ่งต้านทานเยอะ

    let points = [];
    let isDrawing = false;
    let batteryPos = { x: 50, y: 250 };
    let loadPos = { x: 750, y: 250 };
    let gameState = 'IDLE';

    function drawBase() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // วาดแบตเตอรี่ (Source)
        ctx.fillStyle = '#ff4b2b';
        ctx.fillRect(batteryPos.x - 20, batteryPos.y - 30, 40, 60);
        ctx.fillStyle = '#fff';
        ctx.fillText("BATT (220V)", batteryPos.x - 30, batteryPos.y - 40);

        // วาดหลอดไฟนีออน (Load)
        ctx.beginPath();
        ctx.arc(loadPos.x, loadPos.y, 25, 0, Math.PI * 2);
        ctx.strokeStyle = (gameState === 'SUCCESS') ? '#fff' : '#333';
        ctx.fillStyle = (gameState === 'SUCCESS') ? '#f9ed69' : '#1a1a2e';
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.fillText("NEON LIGHT", loadPos.x - 30, loadPos.y - 40);

        // วาดน้ำท่วม (อุปสรรคเด็กปากคลอง)
        ctx.fillStyle = 'rgba(0, 120, 255, 0.3)';
        ctx.fillRect(0, 400, canvas.width, 100);
        ctx.fillText("🌊 โซนน้ำหนุน (ความต้านทานต่ำ/เสี่ยงช็อต)", 10, 480);
    }

    function calculatePhysics() {
        if (points.length < 2) return;

        // คำนวณความยาวสายไฟ (Path length)
        let totalLength = 0;
        let inWater = false;
        for (let i = 1; i < points.length; i++) {
            const d = Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);
            totalLength += d;
            if (points[i].y > 400) inWater = true; // ลงน้ำ!
        }

        // ความต้านทาน (R)
        let R = totalLength * RESISTANCE_PER_PIXEL;
        if (inWater) R *= 0.1; // น้ำทำให้ความต้านทานลดฮวบ = กระแสพุ่ง = ช็อต!
        if (R < 1) R = 1; // กันหารด้วยศูนย์

        // กฎของโอห์ม I = V / R
        const I = VOLTAGE_SOURCE / R;
        currentDisp.innerText = I.toFixed(2);

        // เช็คเงื่อนไข
        const distToLoad = Math.hypot(points[points.length-1].x - loadPos.x, points[points.length-1].y - loadPos.y);
        
        if (distToLoad < 30) {
            if (I > MAX_SAFE_CURRENT) {
                gameState = 'EXPLODED';
                msgDisp.innerText = "💥 ตูม! กระแสเกิน สายไฟละลาย!";
                msgDisp.className = 'danger';
            } else if (I < MIN_REQUIRED_CURRENT) {
                gameState = 'FAIL';
                msgDisp.innerText = "🔌 ไฟตก! แรงดันไม่พอประทังชีวิต";
            } else {
                gameState = 'SUCCESS';
                msgDisp.innerText = "🌟 รอดแล้ว! มีไฟขายของแล้วเด็กปากคลอง!";
                msgDisp.className = '';
            }
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        if (Math.hypot(x - batteryPos.x, y - batteryPos.y) < 40) {
            isDrawing = true;
            points = [{x, y}];
            gameState = 'DRAWING';
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        points.push({ x: e.clientX - rect.left, y: e.clientY - rect.top });
        draw();
    });

    canvas.addEventListener('mouseup', () => {
        isDrawing = false;
        calculatePhysics();
        draw();
    });

    function draw() {
        drawBase();
        if (points.length > 0) {
            ctx.beginPath();
            ctx.strokeStyle = (gameState === 'EXPLODED') ? '#ff4b2b' : '#4ecca3';
            ctx.lineWidth = 3;
            ctx.moveTo(points[0].x, points[0].y);
            for (let p of points) ctx.lineTo(p.x, p.y);
            ctx.stroke();
        }
    }

    function resetGame() {
        points = [];
        gameState = 'IDLE';
        msgDisp.innerText = "รอการเชื่อมต่อ...";
        msgDisp.className = '';
        currentDisp.innerText = '0';
        drawBase();
    }

    drawBase();
</script>

</body>
</html>
